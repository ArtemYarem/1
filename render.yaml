services:
  - type: web
    name: tg-ai-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: HORDE_API_KEY
        value: "0000000000"
      - key: DATABASE_URL
        fromDatabase:
          name: tg-bot-db
          property: connectionString

databases:
  - name: tg-bot-db
    databaseName: tgbot
    plan: free
